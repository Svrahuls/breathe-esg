services:
  # ─── Backend: Django REST API ──────────────────────────────────────────────
  - type: web
    name: breathe-esg-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn breathe_esg.wsgi --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breathe_esg.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
    healthCheckPath: /api/dashboard/stats/

  # ─── Frontend: React SPA ───────────────────────────────────────────────────
  - type: web
    name: breathe-esg
    runtime: static
    plan: starter
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: breathe-esg-api
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

# ─── PostgreSQL database ───────────────────────────────────────────────────────
databases:
  - name: breathe-esg-db
    plan: starter
    region: oregon
    databaseName: breathe_esg
    user: breathe_esg
